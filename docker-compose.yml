services:
  rathole:
    build:
      context: ./rathole
      dockerfile: Dockerfile
    container_name: rathole-server
    network_mode: host
    volumes:
      - ./rathole/run/server.toml:/app/config.toml:ro
    command: ["--server", "/app/config.toml"]
    restart: unless-stopped

  qtun-controller:
    build:
      context: ./qtun-controller
      dockerfile: Dockerfile
    container_name: qtun-controller
    network_mode: host
    volumes:
      - ./qtun-controller/config.toml:/app/config.toml:ro
      - qtun-data:/app/data
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      - rathole
    restart: unless-stopped

volumes:
  qtun-data:
